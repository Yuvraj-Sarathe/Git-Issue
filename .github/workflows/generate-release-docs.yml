name: Automate Version Documentation

on:
  release:
    types: [published]

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We force checkout to use your master administrative key
          token: ${{ secrets.RELEASE_DOCS_PAT }}

      - name: Build Documentation Engine
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p version
          echo "# Global Issue Explorer Documentation — $VERSION_TAG" > "version/$VERSION_TAG.md"
          echo "" >> "version/$VERSION_TAG.md"
          echo "$RELEASE_BODY" >> "version/$VERSION_TAG.md"
          
          # Rebuild index
          cat << 'EOF' > version/README.md
          # Global Issue Explorer Release Documentation
          
          This directory tracks the history of all project releases.
          
          EOF
          
          ls -1 version/v*.md | grep -v README | sort -rV | while read file; do
            filename=$(basename "$file")
            echo "* [$filename]($filename)" >> version/README.md
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Fetch the latest changes from the remote tracking repository
          git fetch origin main
          
          # 2. Stage the new documentation files
          git add version/
          
          # Check if there are actual changes to commit
          if ! git diff --quiet || ! git diff --staged --quiet; then
            # 3. Commit the changes locally
            git commit -m "docs(release): auto-generate docs for $VERSION_TAG"
            
            # 4. Create a temporary local branch out of our commit and rebase it directly onto origin/main
            git checkout -b temp-docs-branch
            git rebase origin/main
            
            # 5. Push cleanly from our local rebased HEAD straight into the remote main branch
            git push origin HEAD:main
          fi
