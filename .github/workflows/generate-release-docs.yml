name: Automate Version Documentation

# TRIGGER: This only runs when a new release is published on GitHub
on:
  release:
    types: [published]

jobs:
  generate-docs:
    name: Scaffold Version Folders
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pulls the full history so we can sort old versions

      - name: Build Documentation Engine
        env:
          # We map these to environment variables so multi-line strings don't break the bash script
          RELEASE_BODY: ${{ github.event.release.body }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          echo "Starting documentation build for $VERSION_TAG..."
          
          # 1. Create the version directory if it doesn't exist
          mkdir -p version
          
          # 2. Create the specific vX.X.X.md file
          echo "# Git-Issue Documentation — $VERSION_TAG" > "version/$VERSION_TAG.md"
          echo "" >> "version/$VERSION_TAG.md"
          echo "$RELEASE_BODY" >> "version/$VERSION_TAG.md"
          
          # 3. Rebuild the master README.md
          # EOF (End of File) is a marker used in a heredoc (a multi-line string block) to safely write massive chunks of text to a file without spamming 'echo'.
          cat << 'EOF' > version/README.md
          
          This directory is auto-generated by the CI/CD pipeline. It contains the historical record of all releases, changelogs, and updates.
          
          EOF
          
          echo "## Latest Release: $VERSION_TAG" >> version/README.md
          echo "" >> version/README.md
          echo "$RELEASE_BODY" >> version/README.md
          echo "" >> version/README.md
          echo "---" >> version/README.md
          echo "## Version History" >> version/README.md
          echo "" >> version/README.md
          
          # 4. Loop through all existing v*.md files, sort them by version number (descending), and build the index links
          ls -1 version/v*.md | grep -v README | sort -rV | while read file; do
            filename=$(basename "$file")
            echo "* [$filename]($filename)" >> version/README.md
          done

      - name: Commit and Push Changes
        run: |
          # We tell git who is making this commit (the automated GitHub bot)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add version/
          
          # If nothing changed, exit cleanly instead of throwing a massive red error
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs(release): auto-generate documentation for $VERSION_TAG" && git push origin HEAD:${{ github.event.repository.default_branch }})
